<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ديوان آل السويلم</title>
<meta name="description" content="ديوان يجمع قصائد إخوة آل السويلم في مكان واحد، مرتّبة وقابلة للفرز بحسب الشاعر." />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap"
  rel="stylesheet"
/>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="ember-glow" aria-hidden="true"></div>

<header class="hero">
  <div class="hero-inner">
    <p class="hero-eyebrow">ديوان أسرة</p>
    <h1 class="hero-title">آل السويلم</h1>
    <p class="hero-subtitle" id="site-subtitle">يُحمَّل من ملف البيانات…</p>

    <nav class="wasm-legend" id="wasm-legend" aria-label="اختيار الشاعر"></nav>
  </div>
</header>

<nav class="filter-bar" id="filter-bar" aria-label="فلترة القصائد">
  <div class="filter-bar-inner">
    <div class="filter-pills" id="filter-pills"></div>
    <div class="search-wrap">
      <input type="search" id="search-input" placeholder="ابحث في عناوين القصائد…" aria-label="بحث في عناوين القصائد" />
    </div>
  </div>
</nav>

<main id="main-view">
  <section class="poems-grid" id="poems-grid" aria-live="polite"></section>
  <section class="poem-detail hidden" id="poem-detail"></section>
</main>

<footer class="site-footer">
  <p>
    ديوان آل السويلم — © <span id="footer-year"></span>
    <span class="footer-note" id="footer-note"></span>
  </p>
</footer>

<script src="js/app.js"></script>
</body>
</html>
